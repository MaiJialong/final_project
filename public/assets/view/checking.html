<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHECK</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="/public/assets/js/checking.js"></script>
  <style>

    body {
      background-image: url('/public/assets/images/富士山.jpg');
      background-size: cover;
      background-position: fixed;
      background-repeat: no-repeat;
    }
  </style>

</head>
<body>
  <div class="container mt-5">
    <div class="row">
      <div class="col-12 text-center">
        <h1 class="display-4">Check your Schedule</h1>
        <p class="lead">Please enter your SSN to check your schedule</p>
      </div>
    </div>

    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <form id="ssnForm">
              <div class="mb-3">
                <label for="ssn" class="form-label">SSN</label>
                <input type="text" class="form-control" id="ssn" placeholder="Please enter your SSN">
              </div>
              <button type="button" class="btn btn-primary w-100" id="submitBtn">CHECK</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div class="row justify-content-center mt-4">
      <div class="col-md-8">
        <div id="result" class="alert alert-info d-none" role="alert">

        </div>
      </div>
    </div>
  </div>

</body>
</html>
